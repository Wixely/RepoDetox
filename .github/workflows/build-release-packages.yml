name: Build Release Packages

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  DOTNET_VERSION: 10.0.x

jobs:
  publish:
    name: Publish ${{ matrix.pkg }} ${{ matrix.runtime }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # CLI + GUI: the original standalone zips
          - { pkg: RepoDetox-cli,      project: RepoDetox/RepoDetox.csproj,                 runtime: win-x64,   binary: RepoDetox.exe,           flavor: standalone }
          - { pkg: RepoDetox-cli,      project: RepoDetox/RepoDetox.csproj,                 runtime: linux-x64, binary: RepoDetox,               flavor: standalone }
          - { pkg: RepoDetox-gui,      project: RepoDetox.Gui/RepoDetox.Gui.csproj,         runtime: win-x64,   binary: RepoDetox.Gui.exe,       flavor: standalone }
          - { pkg: RepoDetox-gui,      project: RepoDetox.Gui/RepoDetox.Gui.csproj,         runtime: linux-x64, binary: RepoDetox.Gui,           flavor: standalone }
          # MCPSharp HTTP server variant — named to match MCPHub's expected asset shape:
          #   {Name}-{osToken}-x64-{flavorToken}-v{version}.zip
          - { pkg: RepoDetoxMCPSharp,  project: RepoDetoxMCPSharp/RepoDetoxMCPSharp.csproj, runtime: win-x64,   binary: RepoDetoxMCPSharp.exe,   flavor: self-contained }
          - { pkg: RepoDetoxMCPSharp,  project: RepoDetoxMCPSharp/RepoDetoxMCPSharp.csproj, runtime: linux-x64, binary: RepoDetoxMCPSharp,       flavor: self-contained }

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Resolve build metadata
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            package_version="${GITHUB_REF_NAME}"
          else
            package_version="dev-${GITHUB_RUN_NUMBER}"
          fi
          echo "PACKAGE_VERSION=${package_version}" >> "$GITHUB_ENV"
          echo "PACKAGE_BASENAME=${{ matrix.pkg }}-${{ matrix.runtime }}-${{ matrix.flavor }}" >> "$GITHUB_ENV"

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore "${{ matrix.project }}" -r ${{ matrix.runtime }}

      - name: Publish standalone single file
        run: >
          dotnet publish "${{ matrix.project }}"
          -c Release
          -r ${{ matrix.runtime }}
          --self-contained true
          --no-restore
          -o "publish/${{ matrix.runtime }}"
          -p:PublishSingleFile=true
          -p:EnableCompressionInSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:DebugType=none
          -p:DebugSymbols=false

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          cd "publish/${{ matrix.runtime }}"
          if [[ "${{ matrix.runtime }}" == linux-* ]]; then
            chmod +x "${{ matrix.binary }}"
          fi
          zip -r "../../${PACKAGE_BASENAME}-${PACKAGE_VERSION}.zip" .

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_BASENAME }}
          path: ${{ env.PACKAGE_BASENAME }}-${{ env.PACKAGE_VERSION }}.zip
          if-no-files-found: error

  release:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/')
    needs: [publish]
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: RepoDetox-*

      - name: Show release assets
        shell: bash
        run: find release-assets -maxdepth 2 -type f | sort

      - name: Create release if missing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 || \
          gh release create "${GITHUB_REF_NAME}" --generate-notes

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          assets=(release-assets/*/*.zip)
          if (( ${#assets[@]} == 0 )); then
            echo "No release ZIP assets found." >&2
            exit 1
          fi
          gh release upload "${GITHUB_REF_NAME}" "${assets[@]}" --clobber
